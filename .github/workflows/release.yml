name: Release
on:
  push: { tags: ['v*'] }
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write   # OIDC token for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm, registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest   # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm publish --provenance    # auth via OIDC; no NPM_TOKEN needed
